name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: FocusPathAIproject/FocusPathAIproject/frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: FocusPathAIproject/FocusPathAIproject/frontend

      - name: Build
        run: npm run build
        working-directory: FocusPathAIproject/FocusPathAIproject/frontend
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://focuspath-ai-backend.onrender.com/api
          VITE_SOCKET_URL: https://focuspath-ai-backend.onrender.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: FocusPathAIproject/FocusPathAIproject/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
